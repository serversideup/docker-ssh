name: Docker Publish (Edge Images)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/**
      - .github/workflows/**
      - generate-tags.sh

jobs:
  build-edge-images:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/service_docker-build-and-publish.yml
    secrets: inherit
    with:
      release_type: 'edge'

  # Scan the freshly-pushed edge image and fail the run on fixable vulnerabilities, so
  # regressions on main surface before they reach beta or a release. Production/beta are
  # intentionally not failed this way.
  scan-edge-image:
    needs: build-edge-images
    uses: ./.github/workflows/service_scan-image.yml
    with:
      image-ref: 'ghcr.io/serversideup/docker-ssh:edge'
      fail-on-vulnerabilities: true

  update_container_readme:
    runs-on: ubuntu-24.04
    name: Push README to Docker Hub
    steps:
      - name: git checkout
        uses: actions/checkout@v7
        with:
          ref: main

      - name: push README to Dockerhub
        uses: christian-korneck/update-container-description-action@v1
        env:
          DOCKER_USER: ${{ secrets.DOCKER_HUB_README_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_HUB_README_PASSWORD }}
        with:
          destination_container_repo: serversideup/docker-ssh
          provider: dockerhub
          short_description: 'Simple SSH container. Great for secure connections into clusters.'
          readme_file: 'README.md'