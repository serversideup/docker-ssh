name: Docker Publish (Security Updates)

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force a rebuild and republish even if no vulnerabilities are detected'
        type: boolean
        required: false
        default: false
  schedule:
    - cron: '0 23 * * 2'  # Weekly Tuesday 23:00 UTC

jobs:
  # Drift detection: scan the already-published image for CVEs disclosed since it was
  # built. fail-on-vulnerabilities is false — a finding here is a signal to rebuild
  # (which pulls patched base packages), not a failure.
  scan-vulnerabilities:
    uses: ./.github/workflows/service_scan-image.yml
    with:
      image-ref: 'ghcr.io/serversideup/docker-ssh'
      fail-on-vulnerabilities: false

  get-latest-release:
    needs: scan-vulnerabilities
    if: ${{ needs.scan-vulnerabilities.outputs.has_vulnerabilities == 'true' || github.event.inputs.force_build == 'true' }}
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.get_latest_release.outputs.release_tag }}
    steps:
      - name: Get Latest Release
        id: get_latest_release
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)
          echo "release_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

  rebuild-and-republish:
    needs: [scan-vulnerabilities, get-latest-release]
    if: ${{ needs.scan-vulnerabilities.outputs.has_vulnerabilities == 'true' || github.event.inputs.force_build == 'true' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/service_docker-build-and-publish.yml
    secrets: inherit
    with:
      release_type: 'latest'
      ref: ${{ needs.get-latest-release.outputs.release_tag }}
